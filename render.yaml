services:
  # ── Backend Web Service ──────────────────────────────────────────
  - type: web
    name: mini-miro-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      # Set to your frontend Render URL e.g. https://mini-miro-frontend.onrender.com
      - key: CLIENT_ORIGIN
        sync: false
      # Set to https://<your-backend>.onrender.com/auth/google/callback
      - key: CALLBACK_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false

  # ── Frontend Static Site ─────────────────────────────────────────
  - type: static
    name: mini-miro-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Set to your backend Render URL e.g. https://mini-miro-backend.onrender.com
      - key: VITE_API_BASE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
